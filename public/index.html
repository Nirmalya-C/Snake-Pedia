<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake-Pedia: User vs AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <div class="game-container">
            <h1>Snake-Pedia 🐍</h1>
            <div class="scoreboard">
                <span id="player-score">Player: 0</span>
                <span id="ai-score">AI: 0</span>
            </div>
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <p class="controls">Use Arrow Keys or WASD to move.</p>
        </div>

        <!-- High Scores Panel -->
        <div class="leaderboard">
            <h2>🏆 High Scores</h2>
            <ol id="score-list">
                <li class="empty-msg">No scores yet — play to be first!</li>
            </ol>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="game-over-title">Game Over</h2>
            <p id="game-over-msg"></p>
            <div class="submit-score">
                <input id="player-name" type="text" maxlength="30" placeholder="Enter your name" />
                <button id="submit-score-btn">Save Score</button>
            </div>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
