<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Snake-Pedia: An interactive snake game where you compete against an AI opponent">
    <meta name="keywords" content="snake game, AI game, browser game, javascript game">
    <meta name="author" content="Snake-Pedia Contributors">
    <title>Snake-Pedia: User vs AI</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="game-container">
        <h1>Snake-Pedia 🐍</h1>
        <div class="scoreboard">
            <span id="player-score">Player: 0</span>
            <span id="ai-score">AI: 0</span>
        </div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <p class="controls">Use Arrow Keys or WASD to move.</p>
    </div>
    <script src="src/js/script.js"></script>
</body>
</html>
