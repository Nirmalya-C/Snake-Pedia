<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Snake-Pedia is a fast-paced player vs AI snake duel built for the browser.">
    <title>Snake-Pedia | Player vs AI Snake Duel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="hero">
        <div class="shell">
            <p class="eyebrow">Arcade Lab</p>
            <h1>Snake-Pedia</h1>
            <p class="lede">Outsmart the AI and claim the arena.</p>
        </div>
    </header>

    <main class="shell">
        <section class="panel">
            <div class="scoreboard">
                <div class="score">
                    <p class="label">Player</p>
                    <p id="player-score" class="value">0</p>
                </div>
                <div class="score">
                    <p class="label">AI</p>
                    <p id="ai-score" class="value">0</p>
                </div>
            </div>
            <div class="controls">
                <p>Use Arrow Keys or WASD to guide your snake. Keep ahead of the AI.</p>
                <div class="chips">
                    <span class="chip">Arrow Keys</span>
                    <span class="chip">WASD</span>
                    <span class="chip">Wrap-around board</span>
                </div>
            </div>
        </section>

        <section class="canvas-wrap" aria-label="Snake game board">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
        </section>
    </main>

    <script src="assets/js/game.js"></script>
</body>
</html>
